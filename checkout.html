<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mansoor Malik | Checkout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand fw-bold" href="index.html">
Mansoor Malik
</a>

<button
class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#menu">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="index.html">
Home
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="shop.html">
Shop
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="cart.html">
Cart
<span class="badge bg-warning text-dark" id="cartCount">0</span>
</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="checkout.html">
Checkout
</a>
</li>

</ul>

</div>

</div>

</nav>

<section class="py-5">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-7">

<div class="card shadow">

<div class="card-body p-4">

<h2 class="text-center mb-4">
Checkout
</h2>

<form id="checkoutForm">

<div class="mb-3">

<label class="form-label">
Full Name
</label>

<input
type="text"
class="form-control"
id="name"
required>

</div>

<div class="mb-3">

<label class="form-label">
Email
</label>

<input
type="email"
class="form-control"
id="email"
required>

</div>

<div class="mb-3">

<label class="form-label">
Phone Number
</label>

<input
type="tel"
class="form-control"
id="phone"
required>

</div>

<div class="mb-3">

<label class="form-label">
Address
</label>

<textarea
class="form-control"
id="address"
rows="3"
required></textarea>

</div>

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
City
</label>

<input
type="text"
class="form-control"
id="city"
required>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
ZIP Code
</label>

<input
type="text"
class="form-control"
id="zip"
required>

</div>

</div>

<div class="d-grid">

<button
type="submit"
class="btn btn-success btn-lg">

Place Order

</button>

</div>

</form>

</div>

</div>

</div>

</div>

</div>

</section>

<footer>

<div class="container text-center">

<p class="mb-0">

© 2026 MA Shop. All Rights Reserved.

</p>

</div>

</footer>

<script src="script.js"></script>

<script>

updateCartCount();

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
